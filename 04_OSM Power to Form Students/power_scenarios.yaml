# power_scenarios.yaml — 权力变化的两种模型(footprint 与 stakeholder 标签永远不变,只动高度)
# ============================================================================
# 模式 _mode(预设 conserve):
#
#  conserve(总量守恒、重分配)——**总 GFA 不变**。既有总建筑量 = 政府与私人早已协商沉淀
#    的「固定信封」;权力转向不凭空增减总量,只**重分配谁占有它**:某方多拿、某方少拿,加总守恒。
#    每方 mult = 其「吸引力权重」:>1 = 多分一点(资本家 1.6 即多拿)、<1 = 让出一点。
#    引擎自动正规化使 Σ新GFA = Σ旧GFA。→ step4 的「总 GFA ×baseline」会是 ×1.00,
#    差异全在「谁的楼长高、谁的略矮」(看各 stakeholder 平均高与 3D 天际线的此消彼长)。
#
#  grow(只增、都更新增)——既有为地板,**只增不减**(垂直加密/都更),总 GFA 上升。
#    mult≥1 在既有上加盖(mult<1 视为不增,不准缩既有)。代表「新一轮开发确实新增量」。
#
# 改这张表 = 反事实:调权重、加情景、切 _mode,不必碰程式。
scenarios:
  current:                 # 基线:conserve 全权重 1 → 完全不变
    _mode: conserve

  developer_led:           # 开发商主导:资本多拿一点,其余让出一点(总量守恒)
    _mode: conserve
    developer: {mult: 1.6}
    resident:  {mult: 0.90}
    state:     {mult: 0.95}
    informal:  {mult: 0.85}
    unknown:   {mult: 0.95}

  community_led:           # 社区主导:居民/在地多拿,资本让出(总量守恒)
    _mode: conserve
    developer: {mult: 0.70}
    resident:  {mult: 1.30}
    state:     {mult: 1.10}
    informal:  {mult: 1.20}
    unknown:   {mult: 1.00}

  state_eco:               # 国家生态:公共多拿、资本让出(总量守恒)
    _mode: conserve
    developer: {mult: 0.70}
    resident:  {mult: 0.95}
    state:     {mult: 1.60}
    informal:  {mult: 1.00}
    unknown:   {mult: 0.95}

  developer_renewal:       # (grow 对照)都更新增:资本与居民实际加盖,总 GFA 上升
    _mode: grow
    developer: {mult: 1.5}
    resident:  {mult: 1.15}
    state:     {mult: 1.0}
    informal:  {mult: 1.0}
    unknown:   {mult: 1.2}

  max_change:              # 看最大变化:grow 模式,把占楼最多的居民/unknown 大幅拔高,总量大涨(均值约 +200%)
    _mode: grow
    resident:  {mult: 4.0, cap_m: 250}
    developer: {mult: 4.0, cap_m: 350}
    unknown:   {mult: 3.0, cap_m: 200}
    state:     {mult: 2.0, cap_m: 150}
    informal:  {mult: 2.0, cap_m: 80}
