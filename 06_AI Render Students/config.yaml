# config.yaml 06 唯一要改的设定(站点/模型/机位 + 提示词论述层)。
# 只改这一档;engine/ 只读不改,改完重跑 run.py 即同步。

# 站点
site: lujiazui                 # 单站预设(notebook 01/02/03)
report_sites:                  # 批量出 canvas/report 的清单(不带参数跑时)
  - lujiazui                   # 资本/超高层
  - caoyang                    # 单位/工人新村
  - yuyuan                     # 居民/里弄石库门
# 可加任何 05/data/<slug>/buildings.parquet 存在的站(如 waitan xujiahui nanjingxi ...)。

# 权力体制(05 regimes.yaml 的 key + current 基线)
regimes:
  - current
  - developer_led
  - state_led
  - resident_self_build
  - shared

# AI 图像模型(Replicate)
#   google/nano-banana             = 预设,保结构改外观最稳
#   black-forest-labs/flux-kontext = 备选
model: google/nano-banana

# 固定机位(动画里唯一不变 = 只有形态在动)
camera:
  elev: 34
  azim: -58

# 体块参考图 dpi
massing_dpi: 140

# 05 资料夹(相对本档;一般不用改)
ws05_dir: "../05_Shanghai Power to Form Students"


# 提示词论述层(学生改这里)。结构由 05 实算,表面由下面文字想象(illustrative)。
# prompt 用英文;改 prompts.regimes.*.look = 改主张的外观。
prompts:
  # 全体制共用脚手架
  base:
    view: "aerial three-quarter view of an urban district, fixed camera"
    render_style: "photorealistic architectural visualization, soft daylight, gentle atmospheric haze"
    # 护栏:命令模型保住参考图体块,不加减楼
    fidelity: "strictly preserve the exact massing, building footprints, heights and skyline of the reference image; do not invent, add, remove or move buildings"
    quality: "high detail, realistic materials, ambient occlusion, coherent lighting"

  # 负面提示
  negative: "extra invented towers, warped or altered skyline, changed building footprints, text, watermark, logo, people in foreground, cartoon, lowres, distorted geometry"

  # 站点地理语境(可选,按 slug)
  sites:
    lujiazui: "a riverside Shanghai financial district by the Huangpu river"
    caoyang:  "a Shanghai workers' village (danwei) superblock district"
    yuyuan:   "a Shanghai old-town lane-house (lilong) district"
    waitan:   "a Shanghai bund waterfront district with historic facades"
    nanjingxi: "a central Shanghai commercial avenue district"
    default:  "a dense Chinese city district"

  # 每种权力的外观论点(核心可改)。体块来自参考图,这里只补材质/气质。
  regimes:
    current:
      look: "the district as it currently stands, mixed building ages, heights and uses, realistic everyday materials"
    developer_led:
      look: "capital-driven CBD of slender glass needle-towers, reflective curtain walls, polished granite plazas, dense and vertical, dusk glow"
    state_led:
      look: "monumental state architecture, massive stone-and-concrete civic blocks converging toward a central peak, axial boulevards, formal symmetrical plazas, daytime"
    resident_self_build:
      look: "fine-grain self-built low-rise vernacular, brick and tile, organic narrow lanes, rooftop additions, laundry and greenery, lived-in and informal"
    shared:
      look: "egalitarian mid-rise blocks of even height, generous shared ground level, courtyards, trees and public greenery, calm low-contrast palette"
